<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FEF2E4"/>
      <stop offset="50%" stop-color="#FEF6EB"/>
      <stop offset="100%" stop-color="#FBF0E0"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4906C"/>
      <stop offset="100%" stop-color="#D86848"/>
    </linearGradient>
    <linearGradient id="book2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BAAD8"/>
      <stop offset="100%" stop-color="#3888B8"/>
    </linearGradient>
    <linearGradient id="book3Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8D060"/>
      <stop offset="100%" stop-color="#7AAA38"/>
    </linearGradient>
    <linearGradient id="book4Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B840"/>
      <stop offset="100%" stop-color="#C09020"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A3A5C"/>
      <stop offset="100%" stop-color="#3A4E78"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#72C280"/>
      <stop offset="100%" stop-color="#4EA060"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0905A"/>
      <stop offset="100%" stop-color="#E8C050"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="600" fill="url(#bg)"/>

  <!-- Warm ambient glows -->
  <circle cx="480" cy="300" r="250" fill="#FFE4B8" opacity="0.2"/>
  <circle cx="760" cy="200" r="140" fill="#FFD898" opacity="0.16"/>
  <circle cx="200" cy="420" r="120" fill="#FFE4C0" opacity="0.15"/>

  <!-- Book shelf (horizontal) -->
  <rect x="200" y="390" width="560" height="10" rx="4" fill="#C8A870" stroke="#B89860" stroke-width="1" opacity="0.75"/>
  <rect x="200" y="398" width="560" height="6" rx="0" fill="#B08850" opacity="0.35"/>

  <!-- Books on shelf (4 books, varying heights and colors) -->
  <!-- Book 1 - coral/red (tall) -->
  <rect x="248" y="305" width="42" height="88" rx="4" fill="url(#bookGrad)"/>
  <rect x="248" y="305" width="8" height="88" rx="2" fill="#C05838" opacity="0.7"/>
  <rect x="258" y="325" width="24" height="3" rx="1" fill="#FFB898" opacity="0.5"/>
  <rect x="258" y="332" width="20" height="2" rx="1" fill="#FFB898" opacity="0.4"/>

  <!-- Book 2 - blue (short, wider) -->
  <rect x="298" y="330" width="50" height="64" rx="4" fill="url(#book2Grad)"/>
  <rect x="298" y="330" width="8" height="64" rx="2" fill="#2870A0" opacity="0.7"/>
  <rect x="308" y="348" width="30" height="3" rx="1" fill="#A8D4F0" opacity="0.5"/>
  <rect x="308" y="355" width="24" height="2" rx="1" fill="#A8D4F0" opacity="0.4"/>

  <!-- Book 3 - green (medium) -->
  <rect x="358" y="316" width="38" height="77" rx="4" fill="url(#book3Grad)"/>
  <rect x="358" y="316" width="8" height="77" rx="2" fill="#5A9028" opacity="0.7"/>
  <rect x="368" y="335" width="20" height="3" rx="1" fill="#D0F0A0" opacity="0.5"/>

  <!-- Book 4 - amber/gold (short, lying under others) -->
  <rect x="404" y="356" width="52" height="37" rx="4" fill="url(#book4Grad)"/>
  <rect x="404" y="356" width="8" height="37" rx="2" fill="#A07018" opacity="0.7"/>

  <!-- Book 5 - purple (tall, right side) -->
  <rect x="462" y="298" width="40" height="95" rx="4" fill="#9878CC"/>
  <rect x="462" y="298" width="8" height="95" rx="2" fill="#7858A8" opacity="0.7"/>
  <rect x="472" y="318" width="22" height="3" rx="1" fill="#DCC8FF" opacity="0.5"/>

  <!-- Book 6 - warm salmon (medium) -->
  <rect x="510" y="320" width="44" height="73" rx="4" fill="#E8907A"/>
  <rect x="510" y="320" width="8" height="73" rx="2" fill="#C07058" opacity="0.7"/>
  <rect x="520" y="340" width="26" height="3" rx="1" fill="#FFCCC0" opacity="0.5"/>
  <rect x="520" y="347" width="20" height="2" rx="1" fill="#FFCCC0" opacity="0.4"/>

  <!-- Book 7 - teal (tall right) -->
  <rect x="562" y="308" width="36" height="84" rx="4" fill="#50A8A0"/>
  <rect x="562" y="308" width="8" height="84" rx="2" fill="#308880" opacity="0.7"/>

  <!-- Music notes floating (upper area) -->
  <!-- Note 1 (left) -->
  <circle cx="280" cy="230" r="8" fill="#F47850" opacity="0.7"/>
  <rect x="287" y="195" width="4" height="36" rx="2" fill="#F47850" opacity="0.7"/>
  <rect x="287" y="195" width="18" height="4" rx="2" fill="#F47850" opacity="0.65"/>
  <!-- Note 2 -->
  <circle cx="380" cy="195" r="7" fill="#5098D0" opacity="0.65"/>
  <rect x="386" y="163" width="3.5" height="33" rx="1.5" fill="#5098D0" opacity="0.65"/>
  <rect x="386" y="163" width="16" height="3.5" rx="1.5" fill="#5098D0" opacity="0.6"/>
  <!-- Double note right -->
  <circle cx="620" cy="210" r="7.5" fill="#C878D0" opacity="0.65"/>
  <circle cx="640" cy="222" r="7.5" fill="#C878D0" opacity="0.6"/>
  <path d="M626 178 L626 212 M646 188 L646 224" stroke="#C878D0" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="626" y1="178" x2="646" y2="188" stroke="#C878D0" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>

  <!-- Note 4 small -->
  <circle cx="720" cy="250" r="6" fill="#E8B840" opacity="0.6"/>
  <rect x="725" y="222" width="3" height="29" rx="1.5" fill="#E8B840" opacity="0.6"/>

  <!-- Film strip / screen (left accent) -->
  <rect x="165" y="200" width="68" height="120" rx="8" fill="url(#screenGrad)" opacity="0.8"/>
  <!-- Film perforations -->
  <rect x="168" y="210" width="10" height="10" rx="2" fill="#1A2840" opacity="0.8"/>
  <rect x="168" y="228" width="10" height="10" rx="2" fill="#1A2840" opacity="0.8"/>
  <rect x="168" y="246" width="10" height="10" rx="2" fill="#1A2840" opacity="0.8"/>
  <rect x="168" y="264" width="10" height="10" rx="2" fill="#1A2840" opacity="0.8"/>
  <rect x="168" y="282" width="10" height="10" rx="2" fill="#1A2840" opacity="0.8"/>
  <rect x="168" y="300" width="10" height="10" rx="2" fill="#1A2840" opacity="0.8"/>
  <rect x="215" y="210" width="10" height="10" rx="2" fill="#1A2840" opacity="0.8"/>
  <rect x="215" y="228" width="10" height="10" rx="2" fill="#1A2840" opacity="0.8"/>
  <rect x="215" y="246" width="10" height="10" rx="2" fill="#1A2840" opacity="0.8"/>
  <rect x="215" y="264" width="10" height="10" rx="2" fill="#1A2840" opacity="0.8"/>
  <rect x="215" y="282" width="10" height="10" rx="2" fill="#1A2840" opacity="0.8"/>
  <rect x="215" y="300" width="10" height="10" rx="2" fill="#1A2840" opacity="0.8"/>
  <!-- Screen glow image (abstract movie scene colors) -->
  <rect x="182" y="214" width="29" height="96" rx="3" fill="#E8986C" opacity="0.7"/>
  <rect x="182" y="240" width="29" height="40" rx="0" fill="#6888D0" opacity="0.5"/>
  <rect x="182" y="280" width="29" height="30" rx="0" fill="#50A050" opacity="0.4"/>

  <!-- Plant/nature element (right hanging vine) -->
  <path d="M790 120 Q792 175 800 230 Q808 280 795 340" stroke="#4EA060" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M795 175 Q820 158 836 168 Q820 182 795 175Z" fill="url(#leafGrad)" opacity="0.82"/>
  <path d="M800 220 Q778 208 766 218 Q780 228 800 220Z" fill="#72C280" opacity="0.78"/>
  <path d="M797 268 Q822 254 838 264 Q823 276 797 268Z" fill="url(#leafGrad)" opacity="0.78"/>
  <path d="M796 308 Q775 298 764 308 Q778 316 796 308Z" fill="#72C280" opacity="0.74"/>

  <!-- Headphones (symbolic of wholesome entertainment, floating) -->
  <path d="M630 128 Q630 90 660 70 Q690 50 720 70 Q750 90 750 128" stroke="#C89050" stroke-width="5" fill="none" stroke-linecap="round"/>
  <rect x="620" y="124" width="20" height="28" rx="10" fill="#D8A060" stroke="#C09050" stroke-width="1.5"/>
  <rect x="740" y="124" width="20" height="28" rx="10" fill="#D8A060" stroke="#C09050" stroke-width="1.5"/>

  <!-- Accent stripe -->
  <rect x="0" y="0" width="960" height="5" rx="0" fill="url(#accentGrad)" opacity="0.45"/>

  <!-- Small floating circles -->
  <circle cx="480" cy="170" r="4" fill="#F0905A" opacity="0.3"/>
  <circle cx="450" cy="150" r="2.5" fill="#E8C050" opacity="0.28"/>
  <circle cx="510" cy="148" r="2.5" fill="#F0905A" opacity="0.25"/>
</svg>
