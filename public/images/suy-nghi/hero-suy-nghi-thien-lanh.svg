<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F2EEF9"/>
      <stop offset="45%" stop-color="#F8F5FC"/>
      <stop offset="100%" stop-color="#EDE8F7"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A4E8C"/>
      <stop offset="60%" stop-color="#5C6CB8"/>
      <stop offset="100%" stop-color="#8B80C8"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D0C8E8"/>
      <stop offset="100%" stop-color="#E8E2F4"/>
    </linearGradient>
    <linearGradient id="glowGrad" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFE8A0"/>
      <stop offset="60%" stop-color="#FFD060"/>
      <stop offset="100%" stop-color="#FFBA20"/>
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6860A8"/>
      <stop offset="100%" stop-color="#8878C0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9880DC"/>
      <stop offset="100%" stop-color="#B890D0"/>
    </linearGradient>
  </defs>

  <!-- Outer background (light lavender) -->
  <rect width="960" height="600" fill="url(#bg)"/>

  <!-- Soft ambient glows on outer layer -->
  <circle cx="480" cy="300" r="260" fill="#E0D8F0" opacity="0.2"/>

  <!-- Night sky panel (central window/scene area) -->
  <rect x="130" y="80" width="700" height="420" rx="28" fill="url(#skyGrad)" opacity="0.88"/>

  <!-- Stars - large radiant -->
  <circle cx="300" cy="148" r="5.5" fill="#FFE880" opacity="0.9"/>
  <circle cx="300" cy="148" r="9" fill="#FFE870" opacity="0.3"/>
  <circle cx="480" cy="118" r="7" fill="#FFFFCC" opacity="0.95"/>
  <circle cx="480" cy="118" r="12" fill="#FFFFF0" opacity="0.25"/>
  <circle cx="660" cy="142" r="5" fill="#FFE880" opacity="0.88"/>
  <circle cx="660" cy="142" r="8.5" fill="#FFE870" opacity="0.28"/>
  <circle cx="380" cy="168" r="4" fill="#FFF8B0" opacity="0.8"/>
  <circle cx="578" cy="160" r="3.5" fill="#FFF8B0" opacity="0.78"/>
  <circle cx="700" cy="178" r="3" fill="#FFFFCC" opacity="0.7"/>
  <circle cx="200" cy="170" r="2.5" fill="#FFFFCC" opacity="0.65"/>
  <circle cx="760" cy="140" r="2.8" fill="#FFFFCC" opacity="0.7"/>
  <circle cx="420" cy="136" r="2.5" fill="#FFF0B0" opacity="0.7"/>
  <circle cx="560" cy="130" r="2" fill="#FFF0B0" opacity="0.65"/>
  <circle cx="340" cy="188" r="2" fill="#FFD8A0" opacity="0.6"/>
  <circle cx="640" cy="180" r="2" fill="#FFD8A0" opacity="0.6"/>
  <!-- Many small stars -->
  <circle cx="240" cy="200" r="1.5" fill="#E0D8FF" opacity="0.65"/>
  <circle cx="260" cy="134" r="1.5" fill="#E0D8FF" opacity="0.6"/>
  <circle cx="180" cy="148" r="1.5" fill="#E8E0FF" opacity="0.6"/>
  <circle cx="720" cy="160" r="1.5" fill="#E0D8FF" opacity="0.6"/>
  <circle cx="780" cy="190" r="1.5" fill="#E8E0FF" opacity="0.55"/>
  <circle cx="503" cy="150" r="1.5" fill="#E0D8FF" opacity="0.6"/>
  <circle cx="448" cy="182" r="1.5" fill="#E8E0FF" opacity="0.55"/>

  <!-- Crescent moon (top left of sky) -->
  <circle cx="220" cy="130" r="32" fill="#FFE060" opacity="0.88"/>
  <circle cx="235" cy="122" r="26" fill="url(#skyGrad)" opacity="0.95"/>

  <!-- Mountain silhouettes (foreground of sky panel) -->
  <path d="M130 500 L250 290 L360 440 L450 310 L540 420 L620 285 L720 430 L830 300 L830 500Z" fill="url(#mountainGrad)" opacity="0.65"/>
  <path d="M130 500 L260 330 L380 460 L470 340 L550 435 L640 308 L740 445 L830 320 L830 500Z" fill="#4C4490" opacity="0.4"/>

  <!-- Glowing object (lantern / firefly cluster, center sky) -->
  <circle cx="480" cy="280" r="40" fill="#FFE060" opacity="0.14"/>
  <circle cx="480" cy="280" r="25" fill="#FFD840" opacity="0.2"/>
  <!-- Lantern shape -->
  <rect x="466" y="260" width="28" height="38" rx="6" fill="#FFE870" opacity="0.9"/>
  <rect x="462" y="255" width="36" height="10" rx="3" fill="#FFD840" opacity="0.85"/>
  <rect x="462" y="298" width="36" height="10" rx="3" fill="#FFD840" opacity="0.85"/>
  <!-- Lantern string -->
  <line x1="480" y1="245" x2="480" y2="255" stroke="#FFD060" stroke-width="1.5" opacity="0.8"/>
  <!-- Lantern glow -->
  <circle cx="480" cy="279" r="18" fill="#FFE870" opacity="0.35"/>
  <circle cx="480" cy="279" r="10" fill="#FFFBB0" opacity="0.5"/>

  <!-- Small fireflies / floating lights -->
  <circle cx="330" cy="360" r="4" fill="#FFE860" opacity="0.55"/>
  <circle cx="330" cy="360" r="7" fill="#FFE860" opacity="0.2"/>
  <circle cx="620" cy="340" r="3.5" fill="#FFE860" opacity="0.5"/>
  <circle cx="620" cy="340" r="6" fill="#FFE860" opacity="0.18"/>
  <circle cx="400" cy="320" r="2.8" fill="#D8E8FF" opacity="0.5"/>
  <circle cx="560" cy="310" r="2.5" fill="#D8E8FF" opacity="0.45"/>
  <circle cx="240" cy="370" r="2.5" fill="#FFE860" opacity="0.45"/>
  <circle cx="710" cy="380" r="2.5" fill="#FFE860" opacity="0.45"/>

  <!-- Frame / window border -->
  <rect x="130" y="80" width="700" height="420" rx="28" fill="none" stroke="#C0B0DE" stroke-width="3" opacity="0.5"/>

  <!-- Foreground ground (outside window) -->
  <rect x="0" y="510" width="960" height="90" rx="0" fill="url(#groundGrad)"/>
  <!-- Soft hill shape -->
  <ellipse cx="480" cy="510" rx="560" ry="40" fill="#E0D8F2" opacity="0.5"/>

  <!-- Seated figure silhouette (meditation) -->
  <ellipse cx="480" cy="506" rx="38" ry="9" fill="#B8B0D8" opacity="0.5"/>
  <!-- Body -->
  <path d="M461 506 Q460 475 466 460 Q480 452 494 460 Q500 475 499 506Z" fill="#9080C0" opacity="0.55"/>
  <!-- Head -->
  <circle cx="480" cy="450" r="16" fill="#9080C0" opacity="0.55"/>
  <!-- Crossed legs -->
  <path d="M461 506 Q445 498 432 506 Q440 516 461 506Z" fill="#9080C0" opacity="0.5"/>
  <path d="M499 506 Q515 498 528 506 Q520 516 499 506Z" fill="#9080C0" opacity="0.5"/>

  <!-- Accent strip top -->
  <rect x="0" y="0" width="960" height="5" rx="0" fill="url(#accentGrad)" opacity="0.45"/>

  <!-- Outer floating orbs -->
  <circle cx="100" cy="250" r="30" fill="#C0B0E8" opacity="0.15"/>
  <circle cx="100" cy="250" r="15" fill="#B0A0DC" opacity="0.12"/>
  <circle cx="870" cy="320" r="28" fill="#C0B0E8" opacity="0.14"/>
  <circle cx="870" cy="320" r="14" fill="#B0A0DC" opacity="0.11"/>
</svg>
