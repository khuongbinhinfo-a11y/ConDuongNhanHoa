<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FEFCF6"/>
      <stop offset="1" stop-color="#EFF6F0"/>
    </linearGradient>
    <linearGradient id="glass" x1="310" y1="120" x2="310" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F0EDE6"/>
    </linearGradient>
    <linearGradient id="liquid" x1="310" y1="200" x2="310" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDFAF3"/>
      <stop offset="1" stop-color="#F5EED7"/>
    </linearGradient>
    <linearGradient id="almond1" x1="540" y1="200" x2="540" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D4A96A"/>
      <stop offset="1" stop-color="#B8863E"/>
    </linearGradient>
    <linearGradient id="soy" x1="580" y1="300" x2="580" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8D8A0"/>
      <stop offset="1" stop-color="#C8B870"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Soft circle accents -->
  <circle cx="160" cy="400" r="180" fill="#E8F0E4" opacity="0.35"/>
  <circle cx="640" cy="120" r="140" fill="#F5EEE0" opacity="0.4"/>
  <!-- Table surface -->
  <rect x="80" y="380" width="640" height="6" rx="3" fill="#DDD5C8" opacity="0.5"/>
  <!-- Glass of milk -->
  <path d="M270 140 L266 370 Q266 380 276 380 L344 380 Q354 380 354 370 L350 140 Z" fill="url(#glass)" stroke="#D8D0C3" stroke-width="1.5"/>
  <path d="M270 200 L266 370 Q266 380 276 380 L344 380 Q354 380 354 370 L350 200 Z" fill="url(#liquid)" opacity="0.85"/>
  <!-- Milk surface highlight -->
  <ellipse cx="310" cy="200" rx="40" ry="6" fill="#FFFFFF" opacity="0.6"/>
  <!-- Small bottle -->
  <rect x="430" y="200" width="50" height="150" rx="8" fill="#F8F4EC" stroke="#D8D0C3" stroke-width="1.2"/>
  <rect x="440" y="180" width="30" height="30" rx="4" fill="#F0EDE6" stroke="#D8D0C3" stroke-width="1"/>
  <rect x="430" y="260" width="50" height="90" rx="0" fill="#FDFAF3" opacity="0.7"/>
  <!-- Almonds -->
  <ellipse cx="560" cy="340" rx="22" ry="12" fill="url(#almond1)" transform="rotate(-20 560 340)"/>
  <ellipse cx="590" cy="350" rx="18" ry="10" fill="#C8944A" transform="rotate(15 590 350)"/>
  <ellipse cx="545" cy="360" rx="16" ry="9" fill="#D0A05A" transform="rotate(-10 545 360)"/>
  <!-- Soy beans -->
  <circle cx="200" cy="350" r="10" fill="#E0D090"/>
  <circle cx="220" cy="360" r="9" fill="#D8C880"/>
  <circle cx="210" cy="340" r="8" fill="#E5D8A0"/>
  <circle cx="185" cy="365" r="9" fill="#DDD090"/>
  <!-- Leaf accent -->
  <path d="M620 260 Q650 220 680 260 Q650 250 620 260 Z" fill="#8DB88A" opacity="0.6"/>
  <path d="M640 255 Q660 230 675 258" stroke="#7AAA77" stroke-width="0.8" fill="none"/>
  <!-- Soft light beam -->
  <rect x="250" y="80" width="120" height="320" rx="60" fill="#FFFDF5" opacity="0.12"/>
</svg>
