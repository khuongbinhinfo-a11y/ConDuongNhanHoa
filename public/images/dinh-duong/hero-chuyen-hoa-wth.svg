<svg width="1600" height="1200" viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sức khỏe chuyển hóa và bữa ăn hằng ngày</title>
  <desc id="desc">Minh họa tông xanh lá về đường chuyển hóa, bữa ăn, đường huyết và năng lượng cơ thể.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f8f2"/>
      <stop offset="45%" stop-color="#ddeedb"/>
      <stop offset="100%" stop-color="#c2dfc1"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f9a6c"/>
      <stop offset="100%" stop-color="#2f7c5d"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>

  <circle cx="220" cy="180" r="140" fill="#ffffff" opacity="0.45" filter="url(#soft)"/>
  <circle cx="1460" cy="180" r="170" fill="#ffffff" opacity="0.35" filter="url(#soft)"/>
  <circle cx="1370" cy="1040" r="220" fill="#ffffff" opacity="0.28" filter="url(#soft)"/>

  <path d="M-40 835 C260 700, 530 900, 820 780 C1060 680, 1340 760, 1660 640 L1660 980 L-40 980 Z" fill="#bfe0cb" opacity="0.65"/>
  <path d="M-40 890 C300 760, 610 975, 910 860 C1160 765, 1410 820, 1660 760" stroke="url(#river)" stroke-width="22" fill="none" stroke-linecap="round"/>

  <g transform="translate(1080,420)">
    <rect x="0" y="0" width="330" height="210" rx="24" fill="#ffffff" opacity="0.88"/>
    <path d="M55 118 H278" stroke="#3e8a66" stroke-width="10" stroke-linecap="round"/>
    <path d="M165 48 V160" stroke="#3e8a66" stroke-width="10" stroke-linecap="round"/>
    <circle cx="165" cy="108" r="66" fill="none" stroke="#5fae80" stroke-width="9"/>
    <text x="165" y="193" text-anchor="middle" font-size="30" fill="#2d5f47" font-family="Georgia, 'Times New Roman', serif">Cân bằng</text>
  </g>

  <g transform="translate(140,420)">
    <rect x="0" y="0" width="290" height="290" rx="145" fill="#ffffff" opacity="0.84"/>
    <circle cx="145" cy="145" r="104" fill="none" stroke="#6ea77b" stroke-width="8"/>
    <path d="M72 145 H218" stroke="#5f8d6a" stroke-width="8" stroke-linecap="round"/>
    <path d="M145 72 V218" stroke="#5f8d6a" stroke-width="8" stroke-linecap="round"/>
    <text x="145" y="255" text-anchor="middle" font-size="26" fill="#2f5f47" font-family="Georgia, 'Times New Roman', serif">Nhịp sống</text>
  </g>

  <g transform="translate(150,180)">
    <text x="0" y="0" font-size="28" letter-spacing="4" fill="#2f7251" font-family="Arial, sans-serif">WHAT THE HEALTH · CHUYỂN HÓA</text>
    <text x="0" y="88" font-size="84" font-weight="700" fill="#234e3b" font-family="Georgia, 'Times New Roman', serif">Sức khỏe chuyển hóa</text>
    <text x="0" y="176" font-size="84" font-weight="700" fill="#234e3b" font-family="Georgia, 'Times New Roman', serif">và bữa ăn hằng ngày</text>
    <text x="0" y="246" font-size="35" fill="#315e49" font-family="Georgia, 'Times New Roman', serif">Hiểu đường đi của năng lượng trước khi đổi thói quen</text>
  </g>

  <g transform="translate(980,1010)">
    <text x="0" y="0" font-size="31" fill="#2c6a4c" font-family="Georgia, 'Times New Roman', serif">Con Duong Nhan Hoa</text>
  </g>
</svg>
