<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EEF8F0"/>
      <stop offset="55%" stop-color="#F7FBF8"/>
      <stop offset="100%" stop-color="#ECF6F0"/>
    </linearGradient>
    <linearGradient id="tableGrad" x1="160" y1="360" x2="800" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8F0EB"/>
      <stop offset="100%" stop-color="#EFF4F0"/>
    </linearGradient>
    <linearGradient id="bowlGrad" x1="380" y1="230" x2="580" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4F9F5"/>
    </linearGradient>
    <linearGradient id="leaf1Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5FB878"/>
      <stop offset="100%" stop-color="#3D9958"/>
    </linearGradient>
    <linearGradient id="leaf2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#72C98A"/>
      <stop offset="100%" stop-color="#4DAD6C"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6EC68A"/>
      <stop offset="100%" stop-color="#4ABBA0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="600" fill="url(#bg)"/>

  <!-- Soft ambient glows -->
  <circle cx="480" cy="300" r="220" fill="#D8F0E2" opacity="0.28"/>
  <circle cx="200" cy="460" r="130" fill="#C8ECDA" opacity="0.18"/>
  <circle cx="760" cy="140" r="100" fill="#D0EDD8" opacity="0.22"/>
  <circle cx="800" cy="420" r="80" fill="#CCE8D8" opacity="0.16"/>

  <!-- Table surface line -->
  <rect x="150" y="370" width="660" height="8" rx="4" fill="#C4DBC9" opacity="0.48"/>

  <!-- Mortar (ceramic bowl) -->
  <ellipse cx="480" cy="350" rx="90" ry="28" fill="#EAEEE8" stroke="#CBD4C8" stroke-width="1.5"/>
  <path d="M390 330 Q390 380 410 395 Q480 415 550 395 Q570 380 570 330 Z" fill="url(#bowlGrad)" stroke="#CBD4C8" stroke-width="1.5"/>
  <ellipse cx="480" cy="330" rx="90" ry="22" fill="#F5F8F4" stroke="#CBD4C8" stroke-width="1.5"/>
  <!-- Bowl rim highlight -->
  <ellipse cx="480" cy="330" rx="78" ry="14" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>

  <!-- Herbs in mortar -->
  <!-- Crushed herb leaves -->
  <ellipse cx="455" cy="338" rx="20" ry="8" fill="#6EC68A" opacity="0.65" transform="rotate(-20 455 338)"/>
  <ellipse cx="480" cy="332" rx="18" ry="7" fill="#5FB878" opacity="0.7" transform="rotate(10 480 332)"/>
  <ellipse cx="505" cy="340" rx="16" ry="7" fill="#72C98A" opacity="0.6" transform="rotate(-35 505 340)"/>
  <circle cx="468" cy="342" r="4" fill="#4DAD6C" opacity="0.55"/>
  <circle cx="490" cy="334" r="3.5" fill="#5BC07A" opacity="0.5"/>

  <!-- Pestle -->
  <rect x="510" y="270" width="18" height="85" rx="9" fill="#F0F3EE" stroke="#C8D0C5" stroke-width="1.5"/>
  <ellipse cx="519" cy="272" rx="11" ry="6" fill="#FFFFFF" stroke="#C8D0C5" stroke-width="1.2"/>

  <!-- Large stem/herb plant left -->
  <path d="M280 440 Q285 380 270 330 Q265 300 275 260" stroke="#4DAD6C" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Leaves on left plant -->
  <path d="M270 330 Q240 310 218 320 Q238 340 270 330Z" fill="url(#leaf1Grad)" opacity="0.85"/>
  <path d="M272 310 Q295 288 315 298 Q298 320 272 310Z" fill="url(#leaf2Grad)" opacity="0.8"/>
  <path d="M268 360 Q242 345 228 358 Q245 372 268 360Z" fill="url(#leaf1Grad)" opacity="0.75"/>
  <path d="M275 278 Q260 260 240 268 Q255 280 275 278Z" fill="url(#leaf2Grad)" opacity="0.7"/>

  <!-- Small flower -->
  <circle cx="275" cy="260" r="12" fill="#FDEAC8" opacity="0.9"/>
  <circle cx="275" cy="260" r="6" fill="#FBCF7A" opacity="0.95"/>
  <circle cx="263" cy="255" r="7" fill="#FDEAC8" opacity="0.7"/>
  <circle cx="287" cy="255" r="7" fill="#FDEAC8" opacity="0.7"/>
  <circle cx="275" cy="248" r="7" fill="#FDEAC8" opacity="0.7"/>
  <circle cx="275" cy="272" r="7" fill="#FDEAC8" opacity="0.7"/>

  <!-- Right herb bundle -->
  <path d="M680 440 Q675 375 685 330 Q690 295 678 255" stroke="#3D9958" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M685 330 Q712 308 734 316 Q716 335 685 330Z" fill="url(#leaf2Grad)" opacity="0.85"/>
  <path d="M682 305 Q658 285 640 295 Q656 312 682 305Z" fill="url(#leaf1Grad)" opacity="0.8"/>
  <path d="M684 358 Q710 342 726 355 Q710 368 684 358Z" fill="url(#leaf2Grad)" opacity="0.75"/>
  <path d="M679 278 Q694 258 714 265 Q700 278 679 278Z" fill="url(#leaf1Grad)" opacity="0.7"/>
  <!-- Small bud (right) -->
  <ellipse cx="678" cy="255" rx="8" ry="11" fill="#A8D8B2" opacity="0.9"/>
  <ellipse cx="678" cy="248" rx="5" ry="7" fill="#6EC68A" opacity="0.85"/>

  <!-- Scattered dried herbs on table -->
  <ellipse cx="350" cy="365" rx="8" ry="3" fill="#8DC98A" opacity="0.5" transform="rotate(-25 350 365)"/>
  <ellipse cx="370" cy="372" rx="6" ry="2.5" fill="#7DB87A" opacity="0.45" transform="rotate(15 370 372)"/>
  <ellipse cx="620" cy="363" rx="7" ry="3" fill="#8DC98A" opacity="0.5" transform="rotate(30 620 363)"/>
  <ellipse cx="605" cy="370" rx="6" ry="2.5" fill="#7DB87A" opacity="0.45" transform="rotate(-20 605 370)"/>

  <!-- Small dried berries/seeds -->
  <circle cx="408" cy="368" r="4" fill="#C4895A" opacity="0.55"/>
  <circle cx="420" cy="362" r="3.5" fill="#BA8050" opacity="0.5"/>
  <circle cx="548" cy="365" r="4" fill="#C4895A" opacity="0.55"/>
  <circle cx="558" cy="370" r="3.5" fill="#BA8050" opacity="0.5"/>

  <!-- Glass jar with dried herbs (right side) -->
  <rect x="640" y="290" width="44" height="76" rx="6" fill="#F5FAF5" stroke="#C8D8C5" stroke-width="1.5"/>
  <ellipse cx="662" cy="290" rx="22" ry="7" fill="#FAFCFA" stroke="#C8D8C5" stroke-width="1.5"/>
  <rect x="648" y="300" width="28" height="24" rx="3" fill="#DDF2E4" opacity="0.5"/>
  <!-- Lid -->
  <rect x="645" y="280" width="34" height="12" rx="5" fill="#E8F0E6" stroke="#BDC8BB" stroke-width="1.2"/>
  <!-- Herb stems inside jar -->
  <line x1="655" y1="303" x2="652" y2="350" stroke="#5FB878" stroke-width="1.5" opacity="0.7"/>
  <line x1="662" y1="300" x2="662" y2="348" stroke="#4DAD6C" stroke-width="1.5" opacity="0.65"/>
  <line x1="670" y1="303" x2="672" y2="350" stroke="#5FB878" stroke-width="1.5" opacity="0.7"/>

  <!-- Small book / journal top left -->
  <rect x="220" y="310" width="52" height="66" rx="5" fill="#F5E8D4" stroke="#DBBF98" stroke-width="1.5"/>
  <rect x="222" y="310" width="8" height="66" rx="2" fill="#DBBF98" opacity="0.8"/>
  <!-- Page lines -->
  <line x1="235" y1="325" x2="266" y2="325" stroke="#DBBF98" stroke-width="1" opacity="0.4"/>
  <line x1="235" y1="333" x2="266" y2="333" stroke="#DBBF98" stroke-width="1" opacity="0.4"/>
  <line x1="235" y1="341" x2="266" y2="341" stroke="#DBBF98" stroke-width="1" opacity="0.4"/>
  <line x1="235" y1="349" x2="266" y2="349" stroke="#DBBF98" stroke-width="1" opacity="0.4"/>
  <line x1="235" y1="357" x2="258" y2="357" stroke="#DBBF98" stroke-width="1" opacity="0.4"/>

  <!-- Accent gradient strip top -->
  <rect x="0" y="0" width="960" height="5" rx="0" fill="url(#accentGrad)" opacity="0.45"/>

  <!-- Floating small dots accent -->
  <circle cx="170" cy="240" r="5" fill="#6EC68A" opacity="0.35"/>
  <circle cx="188" cy="228" r="3.5" fill="#4ABBA0" opacity="0.3"/>
  <circle cx="800" cy="280" r="5" fill="#6EC68A" opacity="0.3"/>
  <circle cx="815" cy="268" r="3.5" fill="#4ABBA0" opacity="0.25"/>
</svg>
